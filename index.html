<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOK OF LEVI // COMMAND CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050505;
    --gold: #C9A84C;
    --gold-bright: #F0C040;
    --dark-grey: #1A1A1A;
    --mid-grey: #2A2A2A;
    --text: #E8E0CC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ===================== PASSWORD GATE ===================== */
  #password-gate {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 20px;
  }

  #password-gate .gate-title {
    font-family: 'Black Ops One', cursive;
    color: var(--gold);
    font-size: clamp(1.2rem, 4vw, 2rem);
    letter-spacing: 0.3em;
    text-align: center;
  }

  #password-gate .gate-subtitle {
    color: var(--text);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    opacity: 0.5;
    margin-bottom: 10px;
  }

  #password-gate .lock-icon {
    font-size: 3rem;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 12px var(--gold));
  }

  #access-input {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    letter-spacing: 0.3em;
    padding: 14px 24px;
    width: min(340px, 80vw);
    text-align: center;
    outline: none;
    box-shadow: 0 0 16px rgba(201, 168, 76, 0.2), inset 0 0 8px rgba(201, 168, 76, 0.05);
    transition: box-shadow 0.3s;
  }

  #access-input:focus {
    box-shadow: 0 0 24px rgba(201, 168, 76, 0.5), inset 0 0 12px rgba(201, 168, 76, 0.1);
  }

  #access-input::placeholder { color: rgba(201,168,76,0.4); letter-spacing: 0.2em; }

  #access-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Black Ops One', cursive;
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    padding: 10px 32px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }

  #access-btn:hover {
    background: var(--gold);
    color: #000;
    box-shadow: 0 0 20px rgba(201, 168, 76, 0.6);
  }

  #access-error {
    color: #FF4444;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    height: 20px;
    transition: opacity 0.3s;
    opacity: 0;
  }

  #access-error.show { opacity: 1; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }

  .shake { animation: shake 0.4s ease; }

  #password-gate.fade-out {
    animation: fadeOut 0.8s ease forwards;
  }

  @keyframes fadeOut {
    to { opacity: 0; pointer-events: none; }
  }

  /* ===================== MAIN APP ===================== */
  #app {
    display: none;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  #app.visible { display: flex; }

  /* ===================== TOP BAR ===================== */
  #top-bar {
    height: 44px;
    background: rgba(10,10,10,0.95);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
    position: relative;
    z-index: 100;
  }

  #top-bar .site-title {
    font-family: 'Black Ops One', cursive;
    color: var(--gold);
    font-size: clamp(0.7rem, 2vw, 1rem);
    letter-spacing: 0.15em;
    text-shadow: 0 0 10px rgba(201,168,76,0.5);
  }

  #desktop-nav {
    display: none;
    gap: 6px;
  }

  @media (min-width: 768px) {
    #desktop-nav { display: flex; }
  }

  .nav-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.6;
  }

  .nav-btn.active, .nav-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    opacity: 1;
    box-shadow: 0 0 8px rgba(201,168,76,0.2);
  }

  /* ===================== PAGES ===================== */
  #pages {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .page {
    position: absolute;
    inset: 0;
    display: none;
  }

  .page.active { display: block; }

  /* ===================== MAP PAGE ===================== */
  #map-page {
    background: var(--bg);
    overflow: hidden;
  }

  #map-canvas-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.08) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Scanlines */
  #map-canvas-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
  }

  /* Corner HUD brackets */
  .hud-corner {
    position: absolute;
    width: 30px;
    height: 30px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
    z-index: 5;
  }

  .hud-corner.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .hud-corner.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .hud-corner.bl { bottom: 48px; left: 8px; border-width: 0 0 2px 2px; }
  .hud-corner.br { bottom: 48px; right: 8px; border-width: 0 2px 2px 0; }

  /* SVG connection lines layer */
  #connection-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  /* ===================== AGENT SPRITES ===================== */
  .agent-sprite {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    z-index: 10;
    transition: filter 0.2s;
    user-select: none;
  }

  .agent-sprite:hover { filter: brightness(1.4); }

  .sprite-body-wrap {
    position: relative;
    width: 36px;
    height: 48px;
  }

  /* Among Us head */
  .sprite-head {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 22px;
    border-radius: 14px 14px 4px 4px;
  }

  /* visor */
  .sprite-visor {
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 10px;
    background: rgba(150,220,255,0.8);
    border-radius: 6px 6px 2px 2px;
    box-shadow: 0 0 6px rgba(150,220,255,0.6);
  }

  /* body */
  .sprite-torso {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 32px;
    height: 22px;
    border-radius: 6px 6px 0 0;
  }

  /* backpack bump */
  .sprite-pack {
    position: absolute;
    bottom: 6px;
    right: 1px;
    width: 10px;
    height: 14px;
    border-radius: 3px;
    opacity: 0.7;
  }

  /* legs */
  .sprite-leg-l, .sprite-leg-r {
    position: absolute;
    bottom: -8px;
    width: 12px;
    height: 10px;
    border-radius: 0 0 4px 4px;
  }

  .sprite-leg-l { left: 2px; }
  .sprite-leg-r { right: 2px; }

  @keyframes walk {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  .agent-sprite .sprite-body-wrap {
    animation: walk 0.5s infinite;
  }

  .agent-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text);
    letter-spacing: 0.1em;
    margin-top: 2px;
    text-shadow: 0 0 4px #000, 0 0 8px #000;
    white-space: nowrap;
  }

  .status-dot-sprite {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 2px;
  }

  .status-dot-sprite.active { background: #44FF88; box-shadow: 0 0 6px #44FF88; }
  .status-dot-sprite.idle   { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .status-dot-sprite.paused { background: #FF6644; box-shadow: 0 0 6px #FF6644; }

  /* ===================== MAP BOTTOM BAR ===================== */
  #map-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 36px;
    background: rgba(10,10,10,0.9);
    border-top: 1px solid rgba(201,168,76,0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 20;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
  }

  #live-clock { color: var(--gold); }
  #active-count { color: var(--text); opacity: 0.7; }

  /* ===================== HUD PANEL ===================== */
  #hud-panel {
    position: absolute;
    top: 0;
    right: -320px;
    width: 300px;
    height: calc(100% - 36px);
    background: rgba(10,10,10,0.95);
    border-left: 1px solid var(--gold);
    z-index: 50;
    transition: right 0.3s ease;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #hud-panel.open { right: 0; }

  #hud-close {
    position: absolute;
    top: 10px;
    right: 10px;
    background: transparent;
    border: none;
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
  }

  #hud-name {
    font-family: 'Black Ops One', cursive;
    color: var(--gold);
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding-bottom: 10px;
    margin-top: 10px;
  }

  .hud-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .hud-label {
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.2em;
    opacity: 0.7;
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 0.8rem;
    color: var(--text);
  }

  .hud-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  #hud-dossier {
    margin-top: auto;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Black Ops One', cursive;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  #hud-dossier:hover {
    background: var(--gold);
    color: #000;
  }

  /* ===================== AGENT ROSTER PAGE ===================== */
  #roster-page {
    overflow-y: auto;
    padding: 20px;
    background: var(--bg);
  }

  .roster-header {
    font-family: 'Black Ops One', cursive;
    color: var(--gold);
    font-size: clamp(1rem, 3vw, 1.5rem);
    letter-spacing: 0.2em;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(201,168,76,0.3);
    text-align: center;
  }

  .roster-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }

  @media (min-width: 640px) {
    .roster-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (min-width: 1024px) {
    .roster-grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  /* Dossier card */
  .agent-card {
    background: var(--dark-grey);
    border: 1px solid var(--gold);
    position: relative;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Corner brackets */
  .agent-card::before,
  .agent-card::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: var(--gold-bright);
    border-style: solid;
    opacity: 0.8;
  }

  .agent-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .agent-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.active { background: #44FF88; box-shadow: 0 0 6px #44FF88; }
  .status-dot.idle   { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .status-dot.paused { background: #FF6644; box-shadow: 0 0 6px #FF6644; }

  .card-name {
    font-family: 'Black Ops One', cursive;
    color: var(--gold);
    font-size: 1rem;
    letter-spacing: 0.1em;
    flex: 1;
  }

  .class-badge {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    padding: 2px 6px;
    border: 1px solid rgba(201,168,76,0.4);
    color: rgba(201,168,76,0.7);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .card-role {
    font-size: 0.7rem;
    color: var(--text);
    opacity: 0.6;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .card-task {
    font-size: 0.75rem;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .task-label {
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    opacity: 0.7;
  }

  .card-stats {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--text);
    opacity: 0.5;
    padding-top: 6px;
    border-top: 1px solid rgba(201,168,76,0.1);
  }

  .task-log-toggle {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 6px 10px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: border-color 0.2s;
  }

  .task-log-toggle:hover { border-color: var(--gold); }

  .task-log {
    display: none;
    flex-direction: column;
    gap: 6px;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(201,168,76,0.15);
    font-size: 0.7rem;
  }

  .task-log.open { display: flex; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    color: var(--text);
    opacity: 0.8;
    line-height: 1.4;
  }

  .task-item .tick { color: var(--gold-bright); flex-shrink: 0; }
  .task-item .pend { color: #888; flex-shrink: 0; }

  /* ===================== BOTTOM NAV (mobile) ===================== */
  #bottom-nav {
    height: 44px;
    background: rgba(10,10,10,0.95);
    border-top: 1px solid rgba(201,168,76,0.3);
    display: flex;
    flex-shrink: 0;
  }

  @media (min-width: 768px) {
    #bottom-nav { display: none; }
  }

  .bottom-nav-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    opacity: 0.5;
    transition: all 0.2s;
  }

  .bottom-nav-btn.active {
    color: var(--gold);
    opacity: 1;
    border-top: 2px solid var(--gold);
  }

  .bottom-nav-btn .nav-icon { font-size: 1rem; }

  /* ===================== SCANLINE on whole app ===================== */
  #app::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<!-- =================== PASSWORD GATE =================== -->
<div id="password-gate">
  <div class="lock-icon">🔒</div>
  <div class="gate-title">BOOK OF LEVI</div>
  <div class="gate-subtitle">CLASSIFIED // COMMAND ACCESS ONLY</div>
  <input type="password" id="access-input" placeholder="ENTER ACCESS CODE" autocomplete="off">
  <div id="access-error">⚠ ACCESS DENIED</div>
  <button id="access-btn">AUTHENTICATE</button>
</div>

<!-- =================== MAIN APP =================== -->
<div id="app">

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="site-title">BOOK OF LEVI // OPERATIONS MAP</div>
    <nav id="desktop-nav">
      <button class="nav-btn active" onclick="showPage('map')">⬡ MAP</button>
      <button class="nav-btn" onclick="showPage('roster')">◈ AGENTS</button>
    </nav>
  </div>

  <!-- Pages -->
  <div id="pages">

    <!-- PAGE 1: MAP -->
    <div class="page active" id="map-page">
      <div id="map-canvas-bg"></div>

      <!-- HUD corners -->
      <div class="hud-corner tl"></div>
      <div class="hud-corner tr"></div>
      <div class="hud-corner bl"></div>
      <div class="hud-corner br"></div>

      <!-- Connection lines SVG -->
      <svg id="connection-svg"></svg>

      <!-- Sprites injected by JS -->

      <!-- HUD Panel -->
      <div id="hud-panel">
        <button id="hud-close" onclick="closeHUD()">✕</button>
        <div id="hud-name">—</div>
        <div class="hud-row">
          <div class="hud-label">STATUS</div>
          <div class="hud-value hud-status">
            <span id="hud-status-dot" class="status-dot-sprite idle"></span>
            <span id="hud-status-txt">—</span>
          </div>
        </div>
        <div class="hud-row">
          <div class="hud-label">ROLE</div>
          <div class="hud-value" id="hud-role">—</div>
        </div>
        <div class="hud-row">
          <div class="hud-label">CURRENT TASK</div>
          <div class="hud-value" id="hud-task">—</div>
        </div>
        <div class="hud-row">
          <div class="hud-label">TASKS COMPLETED TODAY</div>
          <div class="hud-value" id="hud-completed">—</div>
        </div>
        <button id="hud-dossier" onclick="showPage('roster')">▶ VIEW DOSSIER</button>
      </div>

      <!-- Map bottom bar -->
      <div id="map-bottom">
        <div id="live-clock">—</div>
        <div id="active-count">ACTIVE AGENTS: 4</div>
      </div>
    </div>

    <!-- PAGE 2: ROSTER -->
    <div class="page" id="roster-page">
      <div class="roster-header">// AGENT ROSTER //</div>
      <div class="roster-grid" id="roster-grid"></div>
    </div>

  </div>

  <!-- Bottom Nav (mobile) -->
  <nav id="bottom-nav">
    <button class="bottom-nav-btn active" onclick="showPage('map')">
      <span class="nav-icon">⬡</span>MAP
    </button>
    <button class="bottom-nav-btn" onclick="showPage('roster')">
      <span class="nav-icon">◈</span>AGENTS
    </button>
  </nav>

</div>

<script>
// =================== DATA ===================
const agents = {
  at0m:     {name:"At0m",    role:"Executive / Strategic",      status:"active",  suit:"#1A3A5C", current_task:"Managing operations",        completed_today:24},
  operator: {name:"Operator",role:"Team Manager",               status:"active",  suit:"#3A1A1A", current_task:"Dispatching LoRA training",  completed_today:2},
  miriam:   {name:"Miriam",  role:"Biblical Universe Creative", status:"idle",    suit:"#2A1A3A", current_task:"Next run: 2PM ET",           completed_today:1},
  solomon:  {name:"Solomon", role:"Fitness Research",           status:"idle",    suit:"#1A3A1A", current_task:"Awaiting schedule",          completed_today:1},
  daniel:   {name:"Daniel",  role:"Calendar & Intel",           status:"idle",    suit:"#3A3A1A", current_task:"Scheduled 7AM ET",           completed_today:1},
  deborah:  {name:"Deborah", role:"EOD Digest",                 status:"paused",  suit:"#3A2A1A", current_task:"Paused — reactivating soon", completed_today:0},
  ezra:     {name:"Ezra",    role:"Drive Sync",                 status:"idle",    suit:"#1A2A3A", current_task:"Last sync: 30min ago",       completed_today:18},
  pulse:    {name:"Pulse",   role:"Email Dispatch",             status:"idle",    suit:"#2A1A2A", current_task:"Monitoring inbox",           completed_today:3},
  forge:    {name:"Forge",   role:"Dev & Engineering",          status:"active",  suit:"#2A2A1A", current_task:"Building Command Center",    completed_today:2},
  render:   {name:"Render",  role:"Image Generation",           status:"active",  suit:"#1A3A3A", current_task:"Training 5 character LoRAs", completed_today:3},
  scribe:   {name:"Scribe",  role:"Content & Writing",          status:"idle",    suit:"#3A1A3A", current_task:"Books 1-5 complete",         completed_today:5}
};

const taskLogs = {

// =================== PASSWORD GATE ===================
function initGate() {
  if (sessionStorage.getItem('cmd_auth') === 'true') {
    unlockApp(true);
    return;
  }
  const input = document.getElementById('access-input');
  const btn = document.getElementById('access-btn');
  const err = document.getElementById('access-error');

  function attempt() {
    if (input.value === 'LEVI2026') {
      sessionStorage.setItem('cmd_auth', 'true');
      document.getElementById('password-gate').classList.add('fade-out');
      setTimeout(() => unlockApp(), 800);
    } else {
      err.classList.add('show');
      input.classList.add('shake');
      input.value = '';
      setTimeout(() => {
        input.classList.remove('shake');
        err.classList.remove('show');
      }, 1200);
    }
  }

  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
}

function unlockApp(instant) {
  const gate = document.getElementById('password-gate');
  const app = document.getElementById('app');
  if (instant) gate.style.display = 'none';
  else setTimeout(() => { gate.style.display = 'none'; }, 800);
  app.classList.add('visible');
  initMap();
  initRoster();
  startClock();
}

// =================== NAVIGATION ===================
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn, .bottom-nav-btn').forEach(b => b.classList.remove('active'));

  if (page === 'map') {
    document.getElementById('map-page').classList.add('active');
    document.querySelectorAll('[onclick="showPage(\'map\')"]').forEach(b => b.classList.add('active'));
  } else {
    document.getElementById('roster-page').classList.add('active');
    document.querySelectorAll('[onclick="showPage(\'roster\')"]').forEach(b => b.classList.add('active'));
  }
}

// =================== CLOCK ===================
function startClock() {
  function tick() {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('live-clock').textContent =
      `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())} UTC`;
  }
  tick();
  setInterval(tick, 1000);
}

// =================== MAP / SPRITES ===================
const spriteState = {};

function initMap() {
  const map = document.getElementById('map-page');
  const W = () => map.clientWidth;
  const H = () => map.clientHeight - 36; // minus bottom bar

  const agentKeys = Object.keys(agents);

  // Init positions & velocities
  agentKeys.forEach(key => {
    const speed = 40 + Math.random() * 40;
    const angle = Math.random() * Math.PI * 2;
    spriteState[key] = {
      x: 60 + Math.random() * (W() - 120),
      y: 60 + Math.random() * (H() - 120),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      facingRight: Math.cos(angle) > 0
    };
  });

  // Create sprite elements
  agentKeys.forEach(key => {
    const ag = agents[key];
    const st = spriteState[key];
    const el = document.createElement('div');
    el.className = 'agent-sprite';
    el.id = `sprite-${key}`;
    el.style.left = st.x + 'px';
    el.style.top  = st.y + 'px';
    el.innerHTML = `
      <div class="sprite-body-wrap">
        <div class="sprite-head" style="background:${ag.suit}"></div>
        <div class="sprite-visor"></div>
        <div class="sprite-torso" style="background:${ag.suit}"></div>
        <div class="sprite-pack" style="background:${ag.suit}"></div>
        <div class="sprite-leg-l" style="background:${ag.suit}"></div>
        <div class="sprite-leg-r" style="background:${ag.suit}"></div>
      </div>
      <div class="agent-label">${ag.name.toUpperCase()}</div>
      <div class="status-dot-sprite ${ag.status}"></div>
    `;
    el.addEventListener('click', () => openHUD(key));
    map.appendChild(el);
  });

  // Animation loop
  let last = performance.now();
  function loop(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    const w = W(), h = H();

    agentKeys.forEach(key => {
      const st = spriteState[key];
      st.x += st.vx * dt;
      st.y += st.vy * dt;

      if (st.x < 10)         { st.x = 10;     st.vx = Math.abs(st.vx); st.facingRight = true; }
      if (st.x > w - 50)     { st.x = w - 50; st.vx = -Math.abs(st.vx); st.facingRight = false; }
      if (st.y < 10)         { st.y = 10;     st.vy = Math.abs(st.vy); }
      if (st.y > h - 70)     { st.y = h - 70; st.vy = -Math.abs(st.vy); }

      const el = document.getElementById(`sprite-${key}`);
      if (el) {
        el.style.left = st.x + 'px';
        el.style.top  = st.y + 'px';
        el.style.transform = st.facingRight ? '' : 'scaleX(-1)';
      }
    });

    // Draw connection lines
    drawConnections(agentKeys);

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

function drawConnections(keys) {
  const svg = document.getElementById('connection-svg');
  svg.innerHTML = '';
  const DIST = 120;

  for (let i = 0; i < keys.length; i++) {
    for (let j = i + 1; j < keys.length; j++) {
      const a = spriteState[keys[i]];
      const b = spriteState[keys[j]];
      const dx = (a.x + 18) - (b.x + 18);
      const dy = (a.y + 24) - (b.y + 24);
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < DIST) {
        const alpha = (1 - d/DIST) * 0.6;
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1', a.x + 18);
        line.setAttribute('y1', a.y + 24);
        line.setAttribute('x2', b.x + 18);
        line.setAttribute('y2', b.y + 24);
        line.setAttribute('stroke', `rgba(201,168,76,${alpha})`);
        line.setAttribute('stroke-width', '1');
        svg.appendChild(line);
      }
    }
  }
}

// =================== HUD PANEL ===================
function openHUD(key) {
  const ag = agents[key];
  document.getElementById('hud-name').textContent = ag.name.toUpperCase();
  document.getElementById('hud-role').textContent = ag.role;
  document.getElementById('hud-task').textContent = ag.current_task;
  document.getElementById('hud-completed').textContent = ag.completed_today + ' tasks';
  const dot = document.getElementById('hud-status-dot');
  dot.className = `status-dot-sprite ${ag.status}`;
  document.getElementById('hud-status-txt').textContent = ag.status.toUpperCase();
  document.getElementById('hud-panel').classList.add('open');
}

function closeHUD() {
  document.getElementById('hud-panel').classList.remove('open');
}

// =================== ROSTER ===================
function initRoster() {
  const grid = document.getElementById('roster-grid');
  const activeCount = Object.values(agents).filter(a => a.status === 'active').length;
  document.getElementById('active-count').textContent = `ACTIVE AGENTS: ${activeCount}`;

  Object.entries(agents).forEach(([key, ag]) => {
    const logs = taskLogs[key] || ['Task 1','Task 2','Pending task'];
    const card = document.createElement('div');
    card.className = 'agent-card';

    const classLabel = ag.status === 'active' ? 'PRIORITY' : ag.status === 'paused' ? 'STANDBY' : 'ASSIGNED';

    card.innerHTML = `
      <div class="card-header">
        <div class="status-dot ${ag.status}"></div>
        <div class="card-name">${ag.name.toUpperCase()}</div>
        <div class="class-badge">${classLabel}</div>
      </div>
      <div class="card-role">${ag.role}</div>
      <div class="card-task">
        <div class="task-label">CURRENT TASK</div>
        <div>${ag.current_task}</div>
      </div>
      <div class="card-stats">
        <span>COMPLETED TODAY: <strong style="color:var(--gold-bright)">${ag.completed_today}</strong></span>
        <span>STATUS: ${ag.status.toUpperCase()}</span>
      </div>
      <button class="task-log-toggle" onclick="toggleLog(this)">▼ TASK LOG</button>
      <div class="task-log">
        <div class="task-item"><span class="tick">✓</span><span>${logs[0]}</span></div>
        <div class="task-item"><span class="tick">✓</span><span>${logs[1]}</span></div>
        <div class="task-item"><span class="pend">⏳</span><span>${logs[2]}</span></div>
      </div>
    `;

    grid.appendChild(card);
  });
}

function toggleLog(btn) {
  const log = btn.nextElementSibling;
  const open = log.classList.toggle('open');
  btn.textContent = open ? '▲ TASK LOG' : '▼ TASK LOG';
}

// =================== BOOT ===================
initGate();
