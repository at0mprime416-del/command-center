<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Book of Levi — Ops Center</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050505;--gold:#C9A84C;--gold-bright:#F0C040;
  --dg:#1A1A1A;--mg:#2A2A2A;--wall:#111111;--floor:#0D0D0D;
  --text:#E8E0CC;--muted:#6A6050;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace}

/* SCANLINES */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.03) 0px,rgba(0,0,0,0.03) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:9999}

/* PASSWORD GATE */
#gate{position:fixed;inset:0;background:#000;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#gate h1{font-family:'Black Ops One',sans-serif;color:var(--gold);font-size:clamp(1.2rem,3vw,2rem);letter-spacing:0.2em;text-align:center}
#gate-sub{color:var(--muted);font-size:0.75rem;letter-spacing:0.3em}
#gate-input{background:#0A0A0A;border:1px solid var(--gold);color:var(--gold);font-family:'Share Tech Mono',monospace;font-size:1rem;padding:12px 20px;text-align:center;letter-spacing:0.3em;outline:none;width:280px}
#gate-input::placeholder{color:var(--muted)}
#gate-error{color:#FF4040;font-size:0.75rem;letter-spacing:0.2em;min-height:1.2em}
#gate-btn{background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Black Ops One',sans-serif;font-size:0.9rem;padding:10px 32px;cursor:pointer;letter-spacing:0.2em;transition:background 0.2s}
#gate-btn:hover{background:var(--gold);color:#000}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake 0.4s ease}

/* APP */
#app{width:100%;height:100%;display:flex;flex-direction:column}

/* TOP BAR */
#topbar{height:44px;background:#080808;border-bottom:1px solid var(--gold);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:100}
#topbar-left{font-family:'Black Ops One',sans-serif;color:var(--gold);font-size:clamp(0.7rem,1.5vw,0.9rem);letter-spacing:0.15em}
#topbar-right{display:flex;align-items:center;gap:16px;font-size:0.7rem;color:var(--muted)}
#clock{color:var(--gold)}
#active-count{color:#40FF40}
nav{display:flex;gap:4px}
nav button{background:transparent;border:1px solid var(--muted);color:var(--muted);font-family:'Black Ops One',sans-serif;font-size:0.65rem;padding:4px 10px;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s}
nav button.active,nav button:hover{border-color:var(--gold);color:var(--gold)}

/* PAGES */
.page{display:none;flex:1;overflow:hidden}
.page.visible{display:flex}

/* MAP PAGE */
#map-page{position:relative;background:var(--bg);overflow:hidden}
#map-canvas{position:absolute;inset:0}

/* FLOOR PLAN */
#floor-plan{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1.3fr 1fr;grid-template-rows:1.2fr 0.8fr;gap:0;padding:44px 0 56px 0}

.room{position:relative;border:2px solid var(--gold);background:var(--floor);background-image:radial-gradient(circle,rgba(201,168,76,0.06) 1px,transparent 1px);background-size:20px 20px}
.room-label{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-family:'Black Ops One',sans-serif;font-size:0.55rem;color:var(--gold);letter-spacing:0.2em;white-space:nowrap;opacity:0.8}
.desk{position:absolute;width:36px;height:24px;background:#151510;border:1px solid rgba(201,168,76,0.4);border-radius:2px}
.monitor{position:absolute;width:18px;height:12px;background:#001A2A;border:1px solid rgba(0,180,255,0.5);border-radius:1px;box-shadow:0 0 6px rgba(0,180,255,0.3)}

/* HALLWAY */
#hallway{grid-column:3;grid-row:2;border-color:rgba(201,168,76,0.3);position:relative;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
#exit-marker{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
#exit-label{font-family:'Black Ops One',sans-serif;font-size:0.6rem;color:var(--gold);letter-spacing:0.3em}
#exit-arrow{color:var(--gold);font-size:1.2rem;animation:exitpulse 1.5s infinite}
@keyframes exitpulse{0%,100%{opacity:1;transform:translateX(0)}50%{opacity:0.5;transform:translateX(4px)}}

/* DOOR GAPS — override border on connecting sides */
#room-ops{border-bottom-color:transparent}
#room-eng{border-right-color:transparent;border-bottom-color:transparent}
#room-creative{border-left-color:transparent;border-bottom-color:transparent}
#room-intel{border-right-color:transparent}
#room-content{border-right-color:transparent}

/* SPRITES */
.sprite-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;z-index:50;transition:none;user-select:none}
.sprite-wrap:hover .sprite-svg{filter:brightness(1.3)}
.sprite-svg{width:36px;height:44px}
.sprite-name{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--gold);letter-spacing:0.1em;white-space:nowrap;text-shadow:0 0 4px rgba(0,0,0,0.8)}
.sprite-status{width:6px;height:6px;border-radius:50%;position:absolute;top:2px;right:2px}
.s-active{background:#40FF40;box-shadow:0 0 4px #40FF40}
.s-idle{background:#888}
.s-paused{background:#FF8040;box-shadow:0 0 4px #FF8040}
@keyframes walk-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.sprite-wrap.walking .sprite-svg{animation:walk-bob 0.4s infinite}

/* SPEECH BUBBLE */
.speech-bubble{position:absolute;background:#0A0A0A;border:1px solid var(--gold);padding:4px 8px;font-size:8px;color:var(--gold);letter-spacing:0.1em;white-space:nowrap;z-index:200;pointer-events:none}
.speech-bubble::after{content:'';position:absolute;bottom:-5px;left:10px;border:5px solid transparent;border-top-color:var(--gold)}

/* HUD PANEL */
#hud-panel{position:absolute;right:0;top:44px;bottom:56px;width:220px;background:#080808;border-left:1px solid var(--gold);padding:16px;transform:translateX(100%);transition:transform 0.3s ease;z-index:300}
#hud-panel.open{transform:translateX(0)}
#hud-close{position:absolute;top:8px;right:8px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem}
#hud-close:hover{color:var(--gold)}
#hud-name{font-family:'Black Ops One',sans-serif;color:var(--gold);font-size:1rem;margin-bottom:4px}
#hud-role{font-size:0.65rem;color:var(--muted);margin-bottom:12px;line-height:1.4}
.hud-row{font-size:0.65rem;margin-bottom:6px;color:var(--text)}
.hud-label{color:var(--muted)}
#hud-summon{margin-top:16px;width:100%;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Black Ops One',sans-serif;font-size:0.7rem;padding:8px;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s}
#hud-summon:hover{background:var(--gold);color:#000}

/* CONNECTION LINES */
#connection-svg{position:absolute;inset:44px 0 56px 0;pointer-events:none;z-index:40}

/* BOTTOM TICKER */
#ticker-bar{height:28px;background:#080808;border-top:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;overflow:hidden;flex-shrink:0}
#ticker-inner{white-space:nowrap;font-size:0.62rem;color:var(--muted);animation:ticker 40s linear infinite;padding-left:100%}
#ticker-inner span{color:var(--gold);margin:0 4px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* BOTTOM NAV (mobile) */
#bottom-nav{display:none;height:52px;background:#080808;border-top:1px solid var(--gold);flex-shrink:0}
@media(max-width:700px){
  #bottom-nav{display:flex}
  nav{display:none}
  #floor-plan{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 0.5fr}
}
.bnav-btn{flex:1;background:transparent;border:none;color:var(--muted);font-family:'Black Ops One',sans-serif;font-size:0.65rem;letter-spacing:0.1em;cursor:pointer}
.bnav-btn.active{color:var(--gold)}

/* AGENTS PAGE */
#agents-page{flex-direction:column;overflow-y:auto;padding:16px}
#agents-page::-webkit-scrollbar{width:4px}
#agents-page::-webkit-scrollbar-thumb{background:var(--gold)}
.agents-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.agents-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.agents-grid{grid-template-columns:1fr}}
.agent-card{background:var(--dg);border:1px solid var(--gold);padding:14px;position:relative}
.agent-card::before,.agent-card::after{content:'';position:absolute;width:8px;height:8px;border-color:var(--gold-bright);border-style:solid}
.agent-card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.agent-card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.ac-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ac-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ac-name{font-family:'Black Ops One',sans-serif;color:var(--gold);font-size:0.9rem;letter-spacing:0.1em}
.ac-badge{margin-left:auto;font-size:0.55rem;padding:2px 6px;border:1px solid;border-radius:1px;letter-spacing:0.1em}
.badge-active{border-color:#40FF40;color:#40FF40}
.badge-idle{border-color:#888;color:#888}
.badge-paused{border-color:#FF8040;color:#FF8040}
.ac-row{font-size:0.65rem;color:var(--muted);margin-bottom:4px}
.ac-row span{color:var(--text)}
.ac-tasks-btn{margin-top:10px;width:100%;background:transparent;border:1px solid var(--mg);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:0.65rem;padding:6px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;transition:border-color 0.2s}
.ac-tasks-btn:hover{border-color:var(--gold);color:var(--gold)}
.ac-tasks-list{display:none;margin-top:6px;border-top:1px solid var(--mg);padding-top:6px}
.ac-tasks-list.open{display:block}
.task-item{font-size:0.6rem;padding:3px 0;color:var(--muted);display:flex;gap:6px}
.task-done{color:var(--gold)}
.task-pending{color:#888}
.chevron{transition:transform 0.2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div style="font-family:'Black Ops One',sans-serif;color:var(--gold);font-size:2.5rem;letter-spacing:0.3em;margin-bottom:8px">⬡</div>
  <h1>BOOK OF LEVI</h1>
  <div id="gate-sub">OPS CENTER — CLASSIFIED</div>
  <input id="gate-input" type="password" placeholder="ENTER ACCESS CODE" autocomplete="off"/>
  <div id="gate-error"></div>
  <button id="gate-btn">AUTHENTICATE</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="topbar">
    <div id="topbar-left">BOOK OF LEVI // OPS CENTER</div>
    <div id="topbar-right">
      <nav>
        <button class="active" onclick="showPage('map')">MAP</button>
        <button onclick="showPage('agents')">AGENTS</button>
      </nav>
      <span id="active-count">ACTIVE: 4</span>
      <span id="clock">00:00:00</span>
    </div>
  </div>

  <!-- MAP PAGE -->
  <div id="map-page" class="page visible">
    <div id="floor-plan">
      <!-- Row 1 -->
      <div class="room" id="room-eng">
        <div class="room-label">ENGINEERING</div>
        <div class="desk" style="bottom:30%;left:50%;transform:translateX(-50%)">
          <div class="monitor" style="top:-14px;left:50%;transform:translateX(-50%)"></div>
        </div>
      </div>
      <div class="room" id="room-ops">
        <div class="room-label">OPERATIONS — AT0M HQ</div>
        <div class="desk" style="bottom:35%;left:50%;transform:translateX(-50%);width:48px;height:30px">
          <div class="monitor" style="top:-14px;left:50%;transform:translateX(-50%)"></div>
        </div>
      </div>
      <div class="room" id="room-creative">
        <div class="room-label">CREATIVE</div>
        <div class="desk" style="bottom:30%;left:50%;transform:translateX(-50%)">
          <div class="monitor" style="top:-14px;left:50%;transform:translateX(-50%)"></div>
        </div>
      </div>
      <!-- Row 2 -->
      <div class="room" id="room-intel">
        <div class="room-label">INTELLIGENCE</div>
        <div class="desk" style="bottom:25%;left:50%;transform:translateX(-50%)">
          <div class="monitor" style="top:-14px;left:50%;transform:translateX(-50%)"></div>
        </div>
      </div>
      <div class="room" id="room-content">
        <div class="room-label">CONTENT</div>
        <div class="desk" style="bottom:25%;left:50%;transform:translateX(-50%)">
          <div class="monitor" style="top:-14px;left:50%;transform:translateX(-50%)"></div>
        </div>
      </div>
      <div id="hallway">
        <div id="exit-marker" onclick="recallAll()">
          <div id="exit-label">EXIT</div>
          <div id="exit-arrow">→</div>
        </div>
      </div>
    </div>

    <!-- SVG for connection lines -->
    <svg id="connection-svg"></svg>

    <!-- HUD Panel -->
    <div id="hud-panel">
      <button id="hud-close" onclick="closeHUD()">✕</button>
      <div id="hud-name">AGENT</div>
      <div id="hud-role">Role description</div>
      <div class="hud-row"><span class="hud-label">STATUS: </span><span id="hud-status">—</span></div>
      <div class="hud-row"><span class="hud-label">TASK: </span><span id="hud-task">—</span></div>
      <div class="hud-row"><span class="hud-label">COMPLETED: </span><span id="hud-done">—</span></div>
      <button id="hud-summon">📡 SUMMON TO OPS</button>
    </div>
  </div>

  <!-- AGENTS PAGE -->
  <div id="agents-page" class="page">
    <div class="agents-grid" id="agents-grid"></div>
  </div>

  <div id="ticker-bar">
    <div id="ticker-inner"></div>
  </div>
  <div id="bottom-nav">
    <button class="bnav-btn active" onclick="showPage('map',this)">MAP</button>
    <button class="bnav-btn" onclick="showPage('agents',this)">AGENTS</button>
  </div>
</div>

<script>
const AGENTS = {
  at0m:    {name:"At0m",    role:"Executive / Strategic",      status:"active", task:"Managing operations",       done:24, room:"ops",         gender:"male",   accent:"#00D4FF"},
  operator:{name:"Operator",role:"Team Manager",               status:"active", task:"Dispatching LoRA training", done:2,  room:"intelligence",gender:"male",   accent:"#FF4040"},
  miriam:  {name:"Miriam",  role:"Biblical Universe Creative", status:"idle",   task:"Next run: 2PM ET",          done:1,  room:null,          gender:"female", accent:"#C9A84C"},
  solomon: {name:"Solomon", role:"Fitness Research",           status:"idle",   task:"Awaiting schedule",         done:1,  room:null,          gender:"male",   accent:"#40FF40"},
  daniel:  {name:"Daniel",  role:"Calendar & Intel",           status:"idle",   task:"Scheduled 7AM ET",          done:1,  room:null,          gender:"male",   accent:"#8080FF"},
  deborah: {name:"Deborah", role:"EOD Digest",                 status:"paused", task:"Paused — reactivating soon",done:0,  room:null,          gender:"female", accent:"#FF8040"},
  ezra:    {name:"Ezra",    role:"Drive Sync",                 status:"idle",   task:"Last sync: 30min ago",      done:18, room:null,          gender:"male",   accent:"#40FFFF"},
  pulse:   {name:"Pulse",   role:"Email Dispatch",             status:"idle",   task:"Monitoring inbox",          done:3,  room:null,          gender:"male",   accent:"#FF40FF"},
  forge:   {name:"Forge",   role:"Dev & Engineering",          status:"active", task:"Building Command Center",   done:2,  room:"engineering", gender:"male",   accent:"#FFFF40"},
  render:  {name:"Render",  role:"Image Generation",           status:"active", task:"Training character LoRAs",  done:3,  room:"creative",    gender:"male",   accent:"#FF8080"},
  scribe:  {name:"Scribe",  role:"Content & Writing",          status:"idle",   task:"Books 1-5 complete",        done:5,  room:null,          gender:"male",   accent:"#80FF80"},
};

// ROOM DESK POSITIONS (percent of room)
const ROOM_ELS = {
  ops:'room-ops', engineering:'room-eng', creative:'room-creative',
  intelligence:'room-intel', content:'room-content'
};

function getRoomDeskCenter(roomId){
  const el = document.getElementById(ROOM_ELS[roomId]);
  if(!el) return {x:window.innerWidth/2, y:window.innerHeight/2};
  const r = el.getBoundingClientRect();
  return {x: r.left + r.width*0.5, y: r.top + r.height*0.6};
}

function getHallwayPos(){
  const hall = document.getElementById('hallway');
  const r = hall.getBoundingClientRect();
  return {x: r.left + r.width*0.3, y: r.top + r.height*0.5};
}

function getExitPos(){
  return {x: window.innerWidth + 60, y: window.innerHeight*0.75};
}

// SPRITE SVG BUILDER
function buildSpriteSVG(key, agent){
  const accent = agent.accent;
  const isFemale = agent.gender === 'female';
  const bw = isFemale ? 22 : 24;
  const bx = isFemale ? 9 : 8;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 44" fill="none">
    <rect x="11" y="34" width="7" height="5" fill="#111" rx="1"/>
    <rect x="22" y="34" width="7" height="5" fill="#111" rx="1"/>
    <rect x="11" y="23" width="7" height="13" fill="#4A5A30"/>
    <rect x="22" y="23" width="7" height="13" fill="#4A5A30"/>
    <rect x="${bx}" y="13" width="${bw}" height="13" fill="#3A4A28" rx="2"/>
    <rect x="${bx}" y="16" width="4" height="2" fill="${accent}" opacity="0.8"/>
    <rect x="2" y="14" width="7" height="4" fill="#4A5A30" rx="1"/>
    <rect x="31" y="14" width="7" height="4" fill="#4A5A30" rx="1"/>
    <rect x="16" y="10" width="8" height="5" fill="#C4956A"/>
    <circle cx="20" cy="7" r="7" fill="#C4956A"/>
    ${isFemale
      ? `<ellipse cx="20" cy="2" rx="8" ry="3" fill="#2A3A1A" transform="rotate(-8 20 2)"/>
         <path d="M27 3 Q33 1 31 8" stroke="#2A1A0A" stroke-width="2.5" fill="none"/>
         <line x1="15" y1="5" x2="15" y2="3" stroke="#1A1A1A" stroke-width="0.8"/>
         <line x1="17" y1="4.5" x2="17" y2="2.5" stroke="#1A1A1A" stroke-width="0.8"/>
         <line x1="23" y1="5" x2="23" y2="3" stroke="#1A1A1A" stroke-width="0.8"/>
         <line x1="25" y1="4.5" x2="25" y2="2.5" stroke="#1A1A1A" stroke-width="0.8"/>`
      : `<ellipse cx="20" cy="2" rx="8" ry="3" fill="#2A3A1A"/>
         <circle cx="23" cy="1.5" r="1.5" fill="${accent}"/>`
    }
    <circle cx="17" cy="6" r="1.2" fill="#111"/>
    <circle cx="23" cy="6" r="1.2" fill="#111"/>
    <line x1="17" y1="9.5" x2="23" y2="9.5" stroke="#8A6040" stroke-width="1"/>
  </svg>`;
}

// SPRITE STATE MACHINE
const sprites = {};
const states = {}; // AT_DESK | WALKING | IN_OPS | OFFSCREEN

function createSprites(){
  const map = document.getElementById('map-page');
  Object.entries(AGENTS).forEach(([key, agent]) => {
    const wrap = document.createElement('div');
    wrap.className = 'sprite-wrap';
    wrap.id = 'sprite-'+key;
    wrap.innerHTML = `
      <div class="sprite-status s-${agent.status}"></div>
      <div class="sprite-svg">${buildSpriteSVG(key, agent)}</div>
      <div class="sprite-name">${agent.name}</div>
    `;
    wrap.addEventListener('click', ()=> openHUD(key));
    map.appendChild(wrap);
    sprites[key] = {el:wrap, x:0, y:0, tx:0, ty:0, state:'INIT', flipX:false, waypoints:[], key};
  });
}

function placeSprite(key, x, y){
  const s = sprites[key];
  s.x = x; s.y = y;
  s.el.style.left = x+'px';
  s.el.style.top = y+'px';
}

function initPositions(){
  // Place sprites at their room desks or exit
  Object.entries(AGENTS).forEach(([key, agent]) => {
    if(key === 'at0m'){
      const pos = getRoomDeskCenter('ops');
      placeSprite(key, pos.x-18, pos.y-44);
      states[key] = 'AT_DESK';
      return;
    }
    if(agent.room && agent.status === 'active'){
      const pos = getRoomDeskCenter(agent.room);
      placeSprite(key, pos.x-18, pos.y-44);
      states[key] = 'AT_DESK';
    } else {
      // Start in hallway, will walk to exit
      const hall = getHallwayPos();
      placeSprite(key, hall.x + Math.random()*60-30, hall.y-44);
      states[key] = 'AT_HALL';
      setTimeout(()=> walkToExit(key), Math.random()*2000+500);
    }
  });
}

function walkToExit(key){
  if(states[key] === 'OFFSCREEN') return;
  const exit = getExitPos();
  setWaypoints(key, [{x:exit.x, y:exit.y}], 'OFFSCREEN');
}

function walkToOps(key){
  if(key === 'at0m') return;
  const ops = getRoomDeskCenter('ops');
  const hall = getHallwayPos();
  const agent = AGENTS[key];
  const waypoints = [];
  if(agent.room){
    const roomDoor = getRoomDeskCenter(agent.room);
    waypoints.push({x:roomDoor.x, y:hall.y-44});
  }
  waypoints.push({x:ops.x-18, y:ops.y-60});
  setWaypoints(key, waypoints, 'IN_OPS');
  states[key] = 'WALKING_TO_OPS';

  // Show speech bubble at At0m after arrival
  const travelTime = 3000;
  setTimeout(()=>{
    if(states[key] === 'IN_OPS'){
      showBubble(key);
      setTimeout(()=> walkBackToDesk(key), 4000);
    }
  }, travelTime);
}

function walkBackToDesk(key){
  const agent = AGENTS[key];
  if(!agent.room) return walkToExit(key);
  const pos = getRoomDeskCenter(agent.room);
  setWaypoints(key, [{x:pos.x-18, y:pos.y-44}], 'AT_DESK');
}

function recallAll(){
  Object.entries(AGENTS).forEach(([key, agent])=>{
    if(states[key] === 'OFFSCREEN' && agent.room){
      const exit = getExitPos();
      const hall = getHallwayPos();
      const pos = getRoomDeskCenter(agent.room);
      sprites[key].x = exit.x;
      sprites[key].y = hall.y-44;
      sprites[key].el.style.display='flex';
      setWaypoints(key, [{x:hall.x, y:hall.y-44},{x:pos.x-18, y:pos.y-44}], 'AT_DESK');
    }
  });
}

function setWaypoints(key, wps, finalState){
  const s = sprites[key];
  s.waypoints = [...wps];
  s._finalState = finalState;
  s.el.classList.add('walking');
  s.el.style.display = 'flex';
}

// ANIMATION LOOP
let lastTime = 0;
function animate(ts){
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  const SPEED = 80;

  Object.entries(sprites).forEach(([key, s])=>{
    if(!s.waypoints || s.waypoints.length === 0){
      s.el.classList.remove('walking');
      return;
    }
    const target = s.waypoints[0];
    const dx = target.x - s.x;
    const dy = target.y - s.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < 3){
      s.x = target.x; s.y = target.y;
      s.waypoints.shift();
      if(s.waypoints.length === 0){
        s.el.classList.remove('walking');
        states[key] = s._finalState || 'AT_DESK';
        if(states[key] === 'OFFSCREEN') s.el.style.display='none';
      }
    } else {
      const step = Math.min(SPEED*dt, dist);
      s.x += (dx/dist)*step;
      s.y += (dy/dist)*step;
      // Flip sprite when moving left
      s.flipX = dx < 0;
      s.el.querySelector('.sprite-svg').style.transform = s.flipX ? 'scaleX(-1)' : '';
      // Counter-rotate name label so it stays readable
      s.el.querySelector('.sprite-name').style.transform = s.flipX ? 'scaleX(-1)' : '';
    }
    s.el.style.left = s.x+'px';
    s.el.style.top = s.y+'px';
  });

  drawConnections();
  requestAnimationFrame(animate);
}

function drawConnections(){
  const svg = document.getElementById('connection-svg');
  // Clear old lines
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  const keys = Object.keys(sprites);
  const offset = 44; // topbar height
  for(let i=0;i<keys.length;i++){
    const a = sprites[keys[i]];
    if(states[keys[i]]==='OFFSCREEN') continue;
    for(let j=i+1;j<keys.length;j++){
      const b = sprites[keys[j]];
      if(states[keys[j]]==='OFFSCREEN') continue;
      const dx=a.x-b.x, dy=a.y-b.y;
      if(Math.sqrt(dx*dx+dy*dy)<80){
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1',a.x+18); line.setAttribute('y1',a.y+22-offset);
        line.setAttribute('x2',b.x+18); line.setAttribute('y2',b.y+22-offset);
        line.setAttribute('stroke','#C9A84C'); line.setAttribute('stroke-width','0.5');
        line.setAttribute('opacity','0.3');
        svg.appendChild(line);
      }
    }
  }
}

// SPEECH BUBBLE
function showBubble(key){
  const s = sprites[key];
  const old = document.querySelector('.speech-bubble');
  if(old) old.remove();
  const bubble = document.createElement('div');
  bubble.className = 'speech-bubble';
  bubble.textContent = `${AGENTS[key].name.toUpperCase()} REPORTING IN`;
  bubble.style.left = (s.x - 20)+'px';
  bubble.style.top = (s.y - 30)+'px';
  document.getElementById('map-page').appendChild(bubble);
  setTimeout(()=> bubble.remove(), 4000);
}

// HUD PANEL
let hudAgent = null;
function openHUD(key){
  hudAgent = key;
  const agent = AGENTS[key];
  document.getElementById('hud-name').textContent = agent.name.toUpperCase();
  document.getElementById('hud-role').textContent = agent.role;
  document.getElementById('hud-status').textContent = agent.status.toUpperCase();
  document.getElementById('hud-status').style.color = agent.status==='active'?'#40FF40':agent.status==='paused'?'#FF8040':'#888';
  document.getElementById('hud-task').textContent = agent.task;
  document.getElementById('hud-done').textContent = agent.done + ' tasks';
  document.getElementById('hud-summon').style.display = key==='at0m'?'none':'block';
  document.getElementById('hud-panel').classList.add('open');
}
function closeHUD(){document.getElementById('hud-panel').classList.remove('open')}
document.getElementById('hud-summon').addEventListener('click',()=>{
  if(hudAgent && hudAgent!=='at0m') walkToOps(hudAgent);
  closeHUD();
});

// AUTO COMMUNICATION EVENTS
function scheduleComm(){
  const activeAgents = ['forge','render','operator'].filter(k=> states[k]!=='OFFSCREEN'&&states[k]!=='WALKING_TO_OPS'&&states[k]!=='IN_OPS');
  if(activeAgents.length>0){
    const key = activeAgents[Math.floor(Math.random()*activeAgents.length)];
    walkToOps(key);
  }
  setTimeout(scheduleComm, 15000 + Math.random()*20000);
}

// AGENTS PAGE BUILDER
function buildAgentsPage(){
  const grid = document.getElementById('agents-grid');
  Object.entries(AGENTS).forEach(([key,agent])=>{
    const dotColor = agent.status==='active'?'#40FF40':agent.status==='paused'?'#FF8040':'#555';
    const badgeClass = 'badge-'+agent.status;
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.innerHTML = `
      <div class="ac-header">
        <div class="ac-dot" style="background:${dotColor};box-shadow:0 0 4px ${dotColor}"></div>
        <div class="ac-name">${agent.name}</div>
        <div class="ac-badge ${badgeClass}">${agent.status.toUpperCase()}</div>
      </div>
      <div class="ac-row">ROLE: <span>${agent.role}</span></div>
      <div class="ac-row">TASK: <span>${agent.task}</span></div>
      <div class="ac-row">DONE TODAY: <span>${agent.done}</span></div>
      <button class="ac-tasks-btn" onclick="toggleTasks(this)">
        <span>▼ TASK LOG</span>
        <span class="chevron">▼</span>
      </button>
      <div class="ac-tasks-list">
        <div class="task-item"><span class="task-done">✓</span><span>Previous task completed</span></div>
        <div class="task-item"><span class="task-done">✓</span><span>Initialization complete</span></div>
        <div class="task-item"><span class="task-pending">⏳</span><span>${agent.task}</span></div>
      </div>
    `;
    grid.appendChild(card);
  });
}
function toggleTasks(btn){
  const list = btn.nextElementSibling;
  const chev = btn.querySelector('.chevron');
  list.classList.toggle('open');
  chev.classList.toggle('open');
}

// TICKER
function buildTicker(){
  const msgs = Object.entries(AGENTS).map(([k,a])=>`<span>${a.name.toUpperCase()}:</span> ${a.task}`).join(' &nbsp;|&nbsp; ');
  const inner = document.getElementById('ticker-inner');
  inner.innerHTML = msgs + ' &nbsp;&nbsp;&nbsp; ' + msgs;
}

// CLOCK
function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toUTCString().split(' ')[4]+' UTC';
}
setInterval(updateClock, 1000);
updateClock();

// PAGE SWITCHING
function showPage(name, btn){
  document.getElementById('map-page').classList.toggle('visible', name==='map');
  document.getElementById('agents-page').classList.toggle('visible', name==='agents');
  document.querySelectorAll('nav button').forEach(b=> b.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=> b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  // Highlight correct nav button
  const navBtns = document.querySelectorAll('nav button');
  navBtns.forEach(b=>{ if((name==='map'&&b.textContent==='MAP')||(name==='agents'&&b.textContent==='AGENTS')) b.classList.add('active'); });
}

// PASSWORD GATE
function tryAuth(){
  const val = document.getElementById('gate-input').value;
  if(val === 'LEVI2026'){
    sessionStorage.setItem('auth','1');
    document.getElementById('gate').style.opacity='0';
    document.getElementById('gate').style.transition='opacity 0.5s';
    setTimeout(()=>{
      document.getElementById('gate').style.display='none';
      document.getElementById('app').style.display='flex';
      initApp();
    },500);
  } else {
    const inp = document.getElementById('gate-input');
    const err = document.getElementById('gate-error');
    err.textContent = '// ACCESS DENIED';
    inp.classList.add('shake');
    setTimeout(()=> inp.classList.remove('shake'), 400);
    inp.value='';
  }
}
document.getElementById('gate-btn').addEventListener('click', tryAuth);
document.getElementById('gate-input').addEventListener('keydown', e=> e.key==='Enter'&&tryAuth());

function initApp(){
  createSprites();
  buildAgentsPage();
  buildTicker();
  setTimeout(initPositions, 100);
  requestAnimationFrame(animate);
  setTimeout(scheduleComm, 8000);
}

// Auto-login if already authed
if(sessionStorage.getItem('auth')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='flex';
  initApp();
}
</script>
